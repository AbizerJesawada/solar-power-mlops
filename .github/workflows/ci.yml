name: Solar MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-and-validate:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1
      AWS_REGION: ap-south-1


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost pyyaml mlflow matplotlib seaborn streamlit dvc dvc-s3


      - name: Validate Python syntax
        run: |
          python -m py_compile main.py app.py src/pipeline/*.py

      - name: Pull versioned data from DVC remote
        run: |
          dvc pull

      - name: Run training and evaluation pipeline
        run: |
          python main.py

      - name: Validate Streamlit app import
        run: |
          python -c "import app; print('Streamlit app import successful')"

      - name: Upload model and reports
        uses: actions/upload-artifact@v4
        with:
          name: solar-model-reports
          path: |
            models/model.pkl
            reports/
